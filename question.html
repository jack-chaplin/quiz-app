
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Vote</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h2>What is 2 + 2?</h2>
  <button onclick="submitVote('A')">A: 3</button><br>
  <button onclick="submitVote('B')">B: 4</button><br>
  <button onclick="submitVote('C')">C: 5</button><br>

  <p id="msg"></p>

<script>
const SUPABASE_URL = "https://lajqwioamxhqyxrxpxjh.supabase.co";
const SUPABASE_KEY = "sb_publishable_IR77Q9fzehcRVIxAdLxBdg_1gtpgdsz"; // <-- publishable key
const supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  

// Generate or load local anonymous device ID
function getDeviceId() {
  let id = localStorage.getItem("device_id");
  if (!id) {
    id = crypto.randomUUID();
    localStorage.setItem("device_id", id);
  }
  return id;
}

async function submitVote(option) {
  const deviceId = getDeviceId();

  // 1. Check if this device has already answered q1
  const { data: existing, error: selectErr } = await supa
    .from("responses")
    .select("*")
    .eq("question_id", "q1")
    .eq("device_id", deviceId);

  if (existing && existing.length > 0) {
    document.getElementById("msg").innerText =
      "You have already answered this question.";
    return;
  }

  // 2. Submit vote
  const { error: insertErr } = await supa
    .from("responses")
    .insert({
      question_id: "q1",
      option: option,
      device_id: deviceId
    });

  if (insertErr) {
    console.error(insertErr);
    document.getElementById("msg").innerText = "Error submitting vote.";
  } else {
    document.getElementById("msg").innerText = "Vote submitted!";
  }
}
</script>
</body>
</html>
