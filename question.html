
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Vote</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h2>What is 2 + 2?</h2>
  <button onclick="submitVote('A')">A: 3</button><br>
  <button onclick="submitVote('B')">B: 4</button><br>
  <button onclick="submitVote('C')">C: 5</button><br>

  <p id="msg"></p>

<script>
const SUPABASE_URL = "https://lajqwioamxhqyxrxpxjh.supabase.co";
const SUPABASE_KEY = "sb_publishable_IR77Q9fzehcRVIxAdLxBdg_1gtpgdsz"; // <-- publishable key
const supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  

// Generate or load local anonymous device ID
function getDeviceId() {
  let id = localStorage.getItem("device_id");
  if (!id) {
    id = crypto.randomUUID();
    localStorage.setItem("device_id", id);
  }
  return id;
}

// Listen for teacher reset events
supa.channel("reset_channel")
  .on("broadcast", { event: "reset_q1" }, (payload) => {
    const qid = payload.payload.question_id;
    localStorage.removeItem("voted_" + qid);
    document.getElementById("msg").innerText =
      "Voting has been reset — you may vote again.";
  })
  .subscribe();


// Use a vote flag per question
function hasVoted(questionId) {
  return localStorage.getItem("voted_" + questionId) === "true";
}

function setVoted(questionId) {
  localStorage.setItem("voted_" + questionId, "true");
}



async function submitVote(option) {
  const questionId = "q1";
  const deviceId = getDeviceId();
  
  if (hasVoted(questionId)) {
      document.getElementById("msg").innerText =
        "You have already answered this question.";
      return;
  }
  
  const { data, error } = await supa
    .from("responses")
    .insert({
      question_id: questionId,
      option: option,
      device_id: deviceId
    });

  if (error) {
    console.error(error);
    document.getElementById("msg").innerText = "Error submitting vote.";
  } else {
    setVoted(questionId);
    document.getElementById("msg").innerText = "Vote submitted!";
  }
}

</script>
</body>
</html>
