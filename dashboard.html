
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <h2>Live Results: What is 2 + 2?</h2>
  <canvas id="chart"></canvas>

<script>
const SUPABASE_URL = "https://lajqwioamxhqyxrxpxjh.supabase.co";
const SUPABASE_KEY = "sb_publishable_IR77Q9fzehcRVIxAdLxBdg_1gtpgdsz"; // <-- publishable key
const supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ctx = document.getElementById('chart');
const chart = new Chart(ctx, {
  type: 'bar',
  data: { labels: ['A', 'B', 'C'], datasets: [{ label: 'Votes', data: [0,0,0] }] },
  options: { scales: { y: { beginAtZero: true } } }
});

async function loadVotes() {
  const { data, error } = await supa
    .from("responses")
    .select("*")
    .eq("question_id", "q1");
  if (!error) updateChart(data);
}

function updateChart(rows) {
  const counts = { A: 0, B: 0, C: 0 };
  rows.forEach(r => counts[r.option]++);
  chart.data.datasets[0].data = [counts.A, counts.B, counts.C];
  chart.update();
}

// Initial load
loadVotes();

// Realtime subscription (v2 syntax)
supa
  .channel("realtime:responses")
  .on(
    "postgres_changes",
    { event: "*", schema: "public", table: "responses" },
    () => loadVotes()
  )
  .subscribe();
</script>
</body>
</html>
